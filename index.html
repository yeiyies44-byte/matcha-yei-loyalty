<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1A1F1B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MATCHA YEI!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ── BRAND TOKENS ─────────────────────────────────────── */
    :root {
      --ink:        #1A1F1B;
      --ink-mid:    #252B26;
      --ink-light:  #2E3630;
      --phosphor:   #00C832;
      --glow:       #00FF41;
      --pcb-dark:   #007A1E;
      --pcb-trace:  #005714;
      --dim:        #3D4D3E;
      --text-main:  #C8E6C8;
      --text-dim:   #5A7A5C;

      --font-display: 'Orbitron', sans-serif;
      --font-data:    'Share Tech Mono', monospace;
      --font-body:    'Rajdhani', sans-serif;
    }

    /* ── RESET ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--text-main);
      font-family: var(--font-body);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── VIEW SYSTEM ─────────────────────────────────────── */
    .view { display: none; min-height: 100vh; flex-direction: column; }
    .view.active { display: flex; }

    /* ── TYPOGRAPHY ──────────────────────────────────────── */
    .t-display { font-family: var(--font-display); font-weight: 900; letter-spacing: 0.05em; }
    .t-mono    { font-family: var(--font-data); }
    .t-body    { font-family: var(--font-body); font-weight: 400; }
    .t-label   { font-family: var(--font-body); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.75rem; color: var(--text-dim); }

    /* ── WORDMARK ─────────────────────────────────────────── */
    .wordmark {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--phosphor);
      letter-spacing: 0.08em;
      text-shadow: 0 0 20px var(--glow), 0 0 40px rgba(0,200,50,0.3);
    }
    .wordmark span { color: var(--glow); }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      padding: 14px 24px;
      border-radius: 4px;
      transition: all 0.15s;
      width: 100%;
    }
    .btn-primary {
      background: var(--phosphor);
      color: var(--ink);
      box-shadow: 0 0 20px rgba(0,200,50,0.4);
    }
    .btn-primary:active { transform: scale(0.97); box-shadow: 0 0 8px rgba(0,200,50,0.3); }
    .btn-secondary {
      background: transparent;
      color: var(--phosphor);
      border: 1px solid var(--pcb-dark);
    }
    .btn-secondary:active { background: var(--ink-light); }
    .btn-danger {
      background: transparent;
      color: #FF4444;
      border: 1px solid #7A0000;
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── INPUTS ──────────────────────────────────────────── */
    .input {
      width: 100%;
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      color: var(--text-main);
      font-family: var(--font-data);
      font-size: 1rem;
      padding: 12px 16px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--phosphor); box-shadow: 0 0 8px rgba(0,200,50,0.2); }
    .input::placeholder { color: var(--text-dim); }

    /* ── NOTIFICATION TOAST ───────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--phosphor);
      color: var(--ink);
      font-family: var(--font-data);
      font-size: 0.8rem;
      padding: 10px 20px;
      border-radius: 4px;
      z-index: 9999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── PCB DECORATIVE LINE ─────────────────────────────── */
    .pcb-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pcb-dark), transparent);
      margin: 16px 0;
    }
  </style>
</head>
<body>

  <!-- CLIENT: REGISTER -->
  <div class="view" id="view-client-register"></div>

  <!-- CLIENT: CARD -->
  <div class="view" id="view-client-card"></div>

  <!-- OWNER: LOGIN -->
  <div class="view" id="view-owner-login"></div>

  <!-- OWNER: DASHBOARD -->
  <div class="view" id="view-owner-dashboard"></div>

  <!-- TOAST -->
  <div id="toast"></div>

<script>
// JS goes here in later tasks
</script>
</body>
</html>
