<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1A1F1B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MATCHA YEI!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ── BRAND TOKENS ─────────────────────────────────────── */
    :root {
      --ink:        #1A1F1B;
      --ink-mid:    #252B26;
      --ink-light:  #2E3630;
      --phosphor:   #00C832;
      --glow:       #00FF41;
      --pcb-dark:   #007A1E;
      --pcb-trace:  #005714;
      --dim:        #3D4D3E;
      --text-main:  #C8E6C8;
      --text-dim:   #5A7A5C;

      --font-display: 'Orbitron', sans-serif;
      --font-data:    'Share Tech Mono', monospace;
      --font-body:    'Rajdhani', sans-serif;
    }

    /* ── RESET ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--text-main);
      font-family: var(--font-body);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── VIEW SYSTEM ─────────────────────────────────────── */
    .view { display: none; min-height: 100vh; flex-direction: column; }
    .view.active { display: flex; }

    /* ── TYPOGRAPHY ──────────────────────────────────────── */
    .t-display { font-family: var(--font-display); font-weight: 900; letter-spacing: 0.05em; }
    .t-mono    { font-family: var(--font-data); }
    .t-body    { font-family: var(--font-body); font-weight: 400; }
    .t-label   { font-family: var(--font-body); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.75rem; color: var(--text-dim); }

    /* ── WORDMARK ─────────────────────────────────────────── */
    .wordmark {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--phosphor);
      letter-spacing: 0.08em;
      text-shadow: 0 0 20px var(--glow), 0 0 40px rgba(0,200,50,0.3);
    }
    .wordmark span { color: var(--glow); }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      padding: 14px 24px;
      border-radius: 4px;
      transition: all 0.15s;
      width: 100%;
    }
    .btn-primary {
      background: var(--phosphor);
      color: var(--ink);
      box-shadow: 0 0 20px rgba(0,200,50,0.4);
    }
    .btn-primary:active { transform: scale(0.97); box-shadow: 0 0 8px rgba(0,200,50,0.3); }
    .btn-secondary {
      background: transparent;
      color: var(--phosphor);
      border: 1px solid var(--pcb-dark);
    }
    .btn-secondary:active { background: var(--ink-light); }
    .btn-danger {
      background: transparent;
      color: #FF4444;
      border: 1px solid #7A0000;
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── INPUTS ──────────────────────────────────────────── */
    .input {
      width: 100%;
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      color: var(--text-main);
      font-family: var(--font-data);
      font-size: 1rem;
      padding: 12px 16px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--phosphor); box-shadow: 0 0 8px rgba(0,200,50,0.2); }
    .input::placeholder { color: var(--text-dim); }

    /* ── NOTIFICATION TOAST ───────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--phosphor);
      color: var(--ink);
      font-family: var(--font-data);
      font-size: 0.8rem;
      padding: 10px 20px;
      border-radius: 4px;
      z-index: 9999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── PCB DECORATIVE LINE ─────────────────────────────── */
    .pcb-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pcb-dark), transparent);
      margin: 16px 0;
    }
    /* ── CLIENT REGISTRATION ─────────────────────────────────── */
    #view-client-register {
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      min-height: 100vh;
    }
    .register-container {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .register-header { text-align: center; }
    .register-header .wordmark { font-size: 1.8rem; }
    .register-header .tagline {
      font-family: var(--font-data);
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      margin-top: 4px;
    }
    .register-card {
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      border-radius: 8px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .register-card .field { display: flex; flex-direction: column; gap: 6px; }
    .register-card .field-hint {
      font-family: var(--font-data);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }
    .error-msg {
      font-family: var(--font-data);
      font-size: 0.72rem;
      color: #FF6B6B;
      text-align: center;
      min-height: 1em;
    }
    .register-footer {
      font-family: var(--font-data);
      font-size: 0.6rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }
    /* ── CLIENT CARD ──────────────────────────────────────────── */
    #view-client-card {
      align-items: center;
      justify-content: flex-start;
      padding: 32px 24px 48px;
      min-height: 100vh;
      gap: 0;
    }
    .card-wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .card-header { text-align: center; }
    .card-header .wordmark { font-size: 1.6rem; }
    .card-client-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 900;
      color: var(--text-main);
      text-align: center;
      letter-spacing: 0.05em;
      margin-top: 6px;
    }

    /* ── PCB STAMP CARD ─────────────────────────────────────── */
    .stamp-card {
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      border-radius: 10px;
      padding: 24px 20px 28px;
      position: relative;
      overflow: hidden;
    }
    .stamp-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--pcb-dark), var(--phosphor), var(--pcb-dark));
    }
    .stamp-count-label {
      font-family: var(--font-data);
      font-size: 0.65rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
    }
    .stamp-count-label span {
      font-size: 1.1rem;
      color: var(--phosphor);
      text-shadow: 0 0 10px var(--glow);
    }

    /* 3x3 grid of PCB via circles */
    .stamp-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 240px;
      margin: 0 auto 20px;
    }
    .stamp-via {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid var(--pcb-dark);
      background: var(--ink);
      position: relative;
      transition: all 0.2s;
      box-shadow: 0 0 0 5px var(--ink-mid), 0 0 0 7px var(--pcb-trace);
    }
    .stamp-via::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: var(--ink-mid);
    }
    .stamp-via.filled {
      background: var(--phosphor);
      border-color: var(--phosphor);
      box-shadow:
        0 0 0 5px var(--ink-mid),
        0 0 0 7px var(--phosphor),
        0 0 16px rgba(0,255,65,0.5);
    }
    .stamp-via.filled::after {
      background: rgba(0,200,50,0.4);
    }

    /* Reward banner */
    .reward-banner {
      background: linear-gradient(135deg, var(--phosphor), #00A828);
      border-radius: 6px;
      padding: 12px 16px;
      text-align: center;
      display: none;
    }
    .reward-banner.visible { display: block; }
    .reward-banner .reward-title {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: 0.15em;
    }
    .reward-banner .reward-item {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--ink);
      margin-top: 2px;
    }

    /* Progress bar */
    .progress-track {
      height: 4px;
      background: var(--pcb-trace);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--phosphor);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--glow);
      transition: width 0.4s ease;
    }
    .progress-label {
      font-family: var(--font-data);
      font-size: 0.62rem;
      color: var(--text-dim);
      text-align: right;
      margin-top: 4px;
    }

    /* Active promotion */
    .promo-card {
      background: transparent;
      border: 1px solid var(--phosphor);
      border-radius: 8px;
      padding: 14px 16px;
      display: none;
      box-shadow: 0 0 12px rgba(0,200,50,0.15);
    }
    .promo-card.visible { display: block; }
    .promo-card .promo-header {
      font-family: var(--font-data);
      font-size: 0.6rem;
      color: var(--phosphor);
      letter-spacing: 0.2em;
      margin-bottom: 6px;
    }
    .promo-card .promo-text {
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.4;
    }

    /* Card footer */
    .card-footer {
      font-family: var(--font-data);
      font-size: 0.58rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
    /* ── OWNER LOGIN ──────────────────────────────────────────── */
    #view-owner-login {
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 900;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-align: center;
    }
    .pin-display {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--pcb-dark);
      background: transparent;
      transition: all 0.15s;
    }
    .pin-dot.filled {
      background: var(--phosphor);
      border-color: var(--phosphor);
      box-shadow: 0 0 8px var(--glow);
    }
    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      gap: 10px;
    }
    .pin-key {
      height: 56px;
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      border-radius: 6px;
      color: var(--text-main);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.1s;
    }
    .pin-key:active { background: var(--pcb-dark); transform: scale(0.95); }
    .pin-key.clear { color: var(--text-dim); font-family: var(--font-data); font-size: 0.7rem; letter-spacing: 0.05em; }
    .pin-key.enter { background: var(--phosphor); color: var(--ink); border-color: var(--phosphor); }
    .pin-key.enter:active { background: var(--pcb-dark); }
    .login-error {
      font-family: var(--font-data);
      font-size: 0.7rem;
      color: #FF6B6B;
      letter-spacing: 0.05em;
      min-height: 1em;
      text-align: center;
    }
    /* ── OWNER DASHBOARD ─────────────────────────────────────── */
    #view-owner-dashboard {
      flex-direction: column;
      min-height: 100vh;
    }
    .dash-header {
      background: var(--ink-mid);
      border-bottom: 1px solid var(--pcb-dark);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dash-header .wordmark { font-size: 1rem; }
    .dash-logout {
      font-family: var(--font-data);
      font-size: 0.65rem;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--dim);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }
    .dash-logout:active { background: var(--ink-light); }

    .dash-tabs {
      display: flex;
      border-bottom: 1px solid var(--pcb-dark);
      background: var(--ink-mid);
    }
    .dash-tab {
      flex: 1;
      padding: 12px 8px;
      font-family: var(--font-data);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-align: center;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .dash-tab.active {
      color: var(--phosphor);
      border-bottom-color: var(--phosphor);
    }
    .tab-panel { display: none; flex: 1; flex-direction: column; padding: 16px 20px; overflow-y: auto; }
    .tab-panel.active { display: flex; }

    /* Search */
    .search-bar { position: relative; margin-bottom: 16px; }
    .search-bar .input { padding-left: 36px; }
    .search-bar::before {
      content: '//';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-data);
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Customer rows */
    .customer-list { display: flex; flex-direction: column; gap: 10px; }
    .customer-row {
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .customer-row-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .customer-name {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-main);
    }
    .customer-wa {
      font-family: var(--font-data);
      font-size: 0.65rem;
      color: var(--text-dim);
    }
    .customer-stamps-badge {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 900;
      color: var(--phosphor);
      background: rgba(0,200,50,0.1);
      border: 1px solid var(--pcb-dark);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .customer-stamps-badge.full {
      color: var(--ink);
      background: var(--phosphor);
      box-shadow: 0 0 10px rgba(0,255,65,0.4);
    }
    .customer-row-meta {
      font-family: var(--font-data);
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .customer-row-actions { display: flex; gap: 8px; margin-top: 4px; }
    .customer-row-actions .btn { font-size: 0.65rem; padding: 10px 12px; }

    /* Mini stamps */
    .mini-stamps { display: flex; gap: 4px; flex-wrap: wrap; }
    .mini-via {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid var(--pcb-dark);
      background: var(--ink);
    }
    .mini-via.filled {
      background: var(--phosphor);
      border-color: var(--phosphor);
      box-shadow: 0 0 4px var(--glow);
    }

    .no-results {
      font-family: var(--font-data);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      padding: 40px 0;
      letter-spacing: 0.08em;
    }

    /* ── PROMO PANEL ─────────────────────────────────────────── */
    .promo-panel { display: flex; flex-direction: column; gap: 16px; }
    .promo-panel-label {
      font-family: var(--font-data);
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
    }
    .promo-active-preview {
      background: var(--ink-mid);
      border: 1px solid var(--phosphor);
      border-radius: 8px;
      padding: 14px 16px;
      display: none;
    }
    .promo-active-preview.visible { display: block; }
    .promo-active-preview .label {
      font-family: var(--font-data);
      font-size: 0.6rem;
      color: var(--phosphor);
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }
    .promo-active-preview .text {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-main);
    }
    textarea.input {
      resize: vertical;
      min-height: 90px;
      line-height: 1.5;
    }

    /* ── STATS PANEL ─────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    .stat-box {
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      border-radius: 8px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 900;
      color: var(--phosphor);
      text-shadow: 0 0 16px rgba(0,255,65,0.4);
      line-height: 1;
    }
    .stat-label {
      font-family: var(--font-data);
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 6px;
    }
    .stat-box.full-width {
      grid-column: 1 / -1;
    }

    /* ── SETTINGS ROW ────────────────────────────────────────── */
    .settings-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--pcb-trace); }
    .settings-row { display: flex; gap: 10px; align-items: flex-end; }
    .settings-row .field { flex: 1; display: flex; flex-direction: column; gap: 6px; }

    /* ── MANAGEMENT PANEL ────────────────────────────────────── */
    .mgmt-toggle {
      font-family: var(--font-data);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--dim);
      border-radius: 4px;
      padding: 10px 14px;
      cursor: pointer;
      width: auto;
      flex-shrink: 0;
    }
    .mgmt-toggle.open { color: var(--phosphor); border-color: var(--pcb-dark); }
    .mgmt-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--pcb-trace);
      margin-top: 4px;
    }
    .mgmt-panel.open { display: flex; }
    .mgmt-section { display: flex; flex-direction: column; gap: 8px; }
    .mgmt-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .mgmt-detail-item {
      background: var(--ink-light);
      border: 1px solid var(--pcb-trace);
      border-radius: 4px;
      padding: 8px 10px;
    }
    .mgmt-detail-val {
      font-family: var(--font-data);
      font-size: 0.75rem;
      color: var(--text-main);
    }
    .mgmt-detail-lbl {
      font-family: var(--font-data);
      font-size: 0.52rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }
    .mgmt-field { display: flex; flex-direction: column; gap: 6px; }
    .stamp-adjuster { display: flex; align-items: center; gap: 8px; }
    .adj-btn {
      width: 38px;
      height: 38px;
      background: var(--ink-mid);
      border: 1px solid var(--pcb-dark);
      border-radius: 4px;
      color: var(--phosphor);
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
    }
    .adj-btn:active { background: var(--pcb-dark); }
    .adj-count {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--phosphor);
      text-align: center;
      min-width: 32px;
    }
  </style>
</head>
<body>

  <!-- CLIENT: REGISTER -->
  <div class="view" id="view-client-register"></div>

  <!-- CLIENT: CARD -->
  <div class="view" id="view-client-card"></div>

  <!-- OWNER: LOGIN -->
  <div class="view" id="view-owner-login"></div>

  <!-- OWNER: DASHBOARD -->
  <div class="view" id="view-owner-dashboard"></div>

  <!-- TOAST -->
  <div id="toast"></div>

<script>
// ── DATA LAYER ────────────────────────────────────────────
const DB = {
  K: {
    CUSTOMERS:  'matchayei_customers',
    PROMOTION:  'matchayei_promotion',
    SETTINGS:   'matchayei_settings',
    CLIENT_ID:  'matchayei_client_id',
    AUTH:       'matchayei_auth',
  },

  getCustomers() {
    return JSON.parse(localStorage.getItem(this.K.CUSTOMERS) || '[]');
  },

  saveCustomers(list) {
    localStorage.setItem(this.K.CUSTOMERS, JSON.stringify(list));
  },

  getCustomer(id) {
    return this.getCustomers().find(c => c.id === id) || null;
  },

  addCustomer(name, whatsapp) {
    const list = this.getCustomers();
    const customer = {
      id: crypto.randomUUID(),
      name: name.trim(),
      whatsapp: whatsapp.trim(),
      stamps: 1,
      total_visits: 1,
      rewards_redeemed: 0,
      registered_date: new Date().toISOString(),
      last_visit: new Date().toISOString(),
    };
    list.push(customer);
    this.saveCustomers(list);
    return customer;
  },

  addStamp(id) {
    const list = this.getCustomers();
    const idx = list.findIndex(c => c.id === id);
    if (idx === -1) return null;
    list[idx].stamps += 1;
    list[idx].total_visits += 1;
    list[idx].last_visit = new Date().toISOString();
    this.saveCustomers(list);
    return list[idx];
  },

  redeemReward(id) {
    const list = this.getCustomers();
    const idx = list.findIndex(c => c.id === id);
    if (idx === -1 || list[idx].stamps < 9) return null;
    list[idx].stamps = 0;
    list[idx].rewards_redeemed += 1;
    list[idx].last_visit = new Date().toISOString();
    this.saveCustomers(list);
    return list[idx];
  },

  getPromotion() {
    return JSON.parse(localStorage.getItem(this.K.PROMOTION) || 'null');
  },

  setPromotion(message) {
    const promo = message ? { message, date: new Date().toISOString() } : null;
    localStorage.setItem(this.K.PROMOTION, JSON.stringify(promo));
    return promo;
  },

  getSettings() {
    const defaults = { pin: '0000', is_active: true };
    return Object.assign(defaults, JSON.parse(localStorage.getItem(this.K.SETTINGS) || '{}'));
  },

  saveSettings(settings) {
    localStorage.setItem(this.K.SETTINGS, JSON.stringify(settings));
  },

  getStatsToday() {
    const today = new Date().toDateString();
    return this.getCustomers().reduce((acc, c) => {
      if (new Date(c.last_visit).toDateString() === today) acc.stampsToday += 1;
      acc.totalClients += 1;
      acc.totalRewards += c.rewards_redeemed;
      return acc;
    }, { totalClients: 0, stampsToday: 0, totalRewards: 0 });
  },

  updateCustomer(id, { name, whatsapp }) {
    const list = this.getCustomers();
    const idx = list.findIndex(c => c.id === id);
    if (idx === -1) return null;
    if (name) list[idx].name = name.trim();
    if (whatsapp) list[idx].whatsapp = whatsapp.trim();
    this.saveCustomers(list);
    return list[idx];
  },

  deleteCustomer(id) {
    this.saveCustomers(this.getCustomers().filter(c => c.id !== id));
  },

  setStamps(id, count) {
    const list = this.getCustomers();
    const idx = list.findIndex(c => c.id === id);
    if (idx === -1) return null;
    list[idx].stamps = Math.max(0, Math.min(9, count));
    this.saveCustomers(list);
    return list[idx];
  },
};

// ── UNIT TESTS (run via console: runDBTests()) ────────────
function runDBTests() {
  const testId = 'test_' + Date.now();

  const fake = {
    id: testId, name: 'Test User', whatsapp: '555',
    stamps: 8, total_visits: 8, rewards_redeemed: 0,
    registered_date: new Date().toISOString(),
    last_visit: new Date().toISOString(),
  };
  const list = DB.getCustomers();
  list.push(fake);
  DB.saveCustomers(list);

  const stamped = DB.addStamp(testId);
  console.assert(stamped.stamps === 9, 'addStamp: stamps should be 9');
  console.assert(stamped.total_visits === 9, 'addStamp: total_visits should be 9');

  const redeemed = DB.redeemReward(testId);
  console.assert(redeemed.stamps === 0, 'redeemReward: stamps should reset to 0');
  console.assert(redeemed.rewards_redeemed === 1, 'redeemReward: rewards_redeemed should be 1');

  const failedRedeem = DB.redeemReward(testId);
  console.assert(failedRedeem === null, 'redeemReward: should return null when stamps < 9');

  DB.setPromotion('TEST SIGNAL');
  const promo = DB.getPromotion();
  console.assert(promo.message === 'TEST SIGNAL', 'setPromotion: message should match');
  DB.setPromotion(null);
  console.assert(DB.getPromotion() === null, 'setPromotion(null): should clear promotion');

  DB.saveCustomers(DB.getCustomers().filter(c => c.id !== testId));
  console.log('%c✓ DB tests passed', 'color: #00C832; font-weight: bold');
}

// ── VIEW SYSTEM ───────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + id);
  if (el) el.classList.add('active');
}

function toast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── ROUTER ────────────────────────────────────────────────
function router() {
  const isDashboard = new URLSearchParams(window.location.search).has('dashboard');

  if (isDashboard) {
    const auth = sessionStorage.getItem(DB.K.AUTH);
    if (auth === 'true') {
      showView('owner-dashboard');
      renderDashboard();
    } else {
      showView('owner-login');
      renderOwnerLogin();
    }
  } else {
    const clientId = localStorage.getItem(DB.K.CLIENT_ID);
    const customer = clientId ? DB.getCustomer(clientId) : null;
    if (customer) {
      showView('client-card');
      renderClientCard(customer);
    } else {
      showView('client-register');
      renderClientRegister();
    }
  }
}

// ── RENDER STUBS (replaced in later tasks) ───────────────
function renderClientRegister() {
  const v = document.getElementById('view-client-register');
  v.innerHTML = `
    <div class="register-container">
      <div class="register-header">
        <div class="wordmark">MATCHA YEI<span>!</span></div>
        <div class="tagline">SISTEMA DE LOYALTY // PROTOCOLO ACTIVO</div>
      </div>

      <div class="register-card">
        <div class="t-label" style="text-align:center;margin-bottom:4px;">INICIALIZAR CLIENTE</div>
        <div class="pcb-line"></div>

        <div class="field">
          <label class="t-label" for="reg-name">NOMBRE COMPLETO</label>
          <input class="input" id="reg-name" type="text" placeholder="TU NOMBRE" autocomplete="name" maxlength="60">
          <span class="field-hint">// IDENTIFICADOR DE PROTOCOLO</span>
        </div>

        <div class="field">
          <label class="t-label" for="reg-wa">WHATSAPP</label>

      </div>

      <div class="register-footer">
        AL REGISTRARTE RECIBES 1 SELLO DE BIENVENIDA<br>
        9 SELLOS = ROOT MATCHA GRATIS ($75 VALUE)
      </div>
    </div>
  `;

  document.getElementById('btn-register').addEventListener('click', handleRegister);
  document.getElementById('reg-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('reg-wa').focus();
  });
  document.getElementById('reg-wa').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleRegister();
  });

function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const wa   = document.getElementById('reg-wa').value.trim();
  const err  = document.getElementById('reg-error');

  if (!name) { err.textContent = '// ERROR: NOMBRE REQUERIDO'; return; }
  if (!wa)   { err.textContent = '// ERROR: WHATSAPP REQUERIDO'; return; }
  if (wa.replace(/\D/g,'').length < 8) {
    err.textContent = '// ERROR: NÚMERO INVÁLIDO';
    return;
  }

  err.textContent = '';
  const customer = DB.addCustomer(name, wa);
  localStorage.setItem(DB.K.CLIENT_ID, customer.id);
  showView('client-card');
  renderClientCard(customer);
}
function escapeHTML(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function renderClientCard(customer) {
  const v = document.getElementById('view-client-card');
  const promo = DB.getPromotion();
  const stampsNeeded = 9 - customer.stamps;
  const rewardReady = customer.stamps >= 9;

  const stampHTML = Array.from({ length: 9 }, (_, i) =>
    `<div class="stamp-via ${i < customer.stamps ? 'filled' : ''}"></div>`
  ).join('');

  v.innerHTML = `
    <div class="card-wrapper">
      <div class="card-header">
        <div class="wordmark">MATCHA YEI<span>!</span></div>
        <div class="card-client-name">${escapeHTML(customer.name.toUpperCase())}</div>
      </div>

      <div class="stamp-card">

        <div class="stamp-grid">${stampHTML}</div>

        <div class="reward-banner ${rewardReady ? 'visible' : ''}">
          <div class="reward-title">// RECOMPENSA DISPONIBLE</div>
          <div class="reward-item">ROOT MATCHA GRATIS</div>
        </div>

        <div class="progress-track">
          <div class="progress-fill" style="width:${(customer.stamps/9)*100}%"></div>
        </div>
        <div class="progress-label">
          ${rewardReady ? '// PROTOCOLO_006 DESBLOQUEADO' : `// FALTAN ${stampsNeeded} SELLO${stampsNeeded !== 1 ? 'S' : ''}`}

      </div>

      <div class="promo-card ${promo ? 'visible' : ''}">
        <div class="promo-header">// SEÑAL ACTIVA</div>
        <div class="promo-text">${promo ? escapeHTML(promo.message) : ''}</div>
      </div>

      <div class="card-footer">

function renderOwnerLogin() {
  const v = document.getElementById('view-owner-login');
  let pin = '';

  v.innerHTML = `
    <div class="login-container">
      <div class="wordmark" style="font-size:1.6rem">MATCHA YEI<span>!</span></div>
      <div class="login-title">// ACCESO DASHBOARD</div>

      <div class="pin-display">
        ${[0,1,2,3].map(i => `<div class="pin-dot" id="dot-${i}"></div>`).join('')}
      </div>

      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n =>
          `<button class="pin-key" data-key="${n}">${n}</button>`
        ).join('')}
        <button class="pin-key clear" data-key="clear">CLR</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key enter" data-key="enter">OK</button>
      </div>

      <div class="login-error" id="login-error"></div>
    </div>
  `;

  function updateDots() {
    [0,1,2,3].forEach(i => {
      document.getElementById('dot-' + i)
        .classList.toggle('filled', i < pin.length);
    });
  }

  function attemptAuth() {
    const settings = DB.getSettings();
    if (pin === settings.pin) {
      sessionStorage.setItem(DB.K.AUTH, 'true');
      showView('owner-dashboard');
      renderDashboard();
    } else {
      document.getElementById('login-error').textContent = '// PIN INCORRECTO';
      pin = '';
      updateDots();
    }
  }

  v.querySelectorAll('.pin-key').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      if (key === 'clear') {
        pin = '';
        document.getElementById('login-error').textContent = '';
      } else if (key === 'enter') {
        attemptAuth();
        return;
      } else if (pin.length < 4) {
        pin += key;
        if (pin.length === 4) {
          updateDots();
          attemptAuth();
          return;
        }
      }
      updateDots();
    });
  });
}
function renderDashboard() {
  const v = document.getElementById('view-owner-dashboard');

  v.innerHTML = `
    <div class="dash-header">
      <div class="wordmark">MATCHA YEI<span>!</span></div>
      <button class="dash-logout" id="btn-logout">SALIR //</button>
    </div>

      <button class="dash-tab active" data-tab="clientes">CLIENTES</button>

    </div>

    <div class="tab-panel active" id="tab-clientes">
      <div class="search-bar">
        <input class="input" id="search-input" type="text" placeholder="BUSCAR POR NOMBRE O WA...">
      </div>
      <div class="customer-list" id="customer-list"></div>
    </div>

    <div class="tab-panel" id="tab-senal"></div>
    <div class="tab-panel" id="tab-stats"></div>
  `;

  v.querySelectorAll('.dash-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      v.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
      v.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const panel = document.getElementById('tab-' + tab.dataset.tab);
      panel.classList.add('active');
      if (tab.dataset.tab === 'senal') renderPromoPanel();
      if (tab.dataset.tab === 'stats') renderStatsPanel();
    });
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    sessionStorage.removeItem(DB.K.AUTH);
    window.location.reload();
  });

  document.getElementById('search-input').addEventListener('input', e => {
    renderCustomerList(e.target.value);
  });

  renderCustomerList('');
}

function renderCustomerList(query) {
  const list = document.getElementById('customer-list');
  if (!list) return;

  let customers = DB.getCustomers();
  const q = query.trim().toLowerCase();
  if (q) {
    customers = customers.filter(c =>
      c.name.toLowerCase().includes(q) || c.whatsapp.includes(q)
    );
  }

  customers.sort((a, b) => {
    if (a.stamps >= 9 && b.stamps < 9) return -1;
    if (b.stamps >= 9 && a.stamps < 9) return 1;
    return new Date(b.last_visit) - new Date(a.last_visit);
  });

  if (customers.length === 0) {
    list.innerHTML = `<div class="no-results">// SIN RESULTADOS</div>`;
    return;
  }

  list.innerHTML = customers.map(c => {
    const lastVisit = new Date(c.last_visit).toLocaleDateString('es-MX', { day:'2-digit', month:'short' });
    const regDate = new Date(c.registered_date).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });
    const miniStamps = Array.from({length:9},(_,i)=>
      `<div class="mini-via ${i<c.stamps?'filled':''}"></div>`).join('');
    const rewardReady = c.stamps >= 9;

    return `
      <div class="customer-row">
        <div class="customer-row-top">
          <div>
            <div class="customer-name">${escapeHTML(c.name)}</div>
            <div class="customer-wa">${escapeHTML(c.whatsapp)}</div>
          </div>
          <div class="customer-stamps-badge ${rewardReady?'full':''}">${c.stamps}/9</div>
        </div>
        <div class="mini-stamps">${miniStamps}</div>
        <div class="customer-row-meta">
          VISITAS: ${c.total_visits} &nbsp;·&nbsp; CANJES: ${c.rewards_redeemed} &nbsp;·&nbsp; ÚLTIMA: ${lastVisit}
        </div>
        <div class="customer-row-actions">
          <button class="btn btn-secondary" onclick="handleGiveStamp('${c.id}')">+ SELLO</button>
          ${rewardReady ? `<button class="btn btn-primary" onclick="handleRedeemReward('${c.id}')">CANJEAR</button>` : ''}
          <button class="btn mgmt-toggle" id="mgmt-btn-${c.id}" onclick="toggleMgmt('${c.id}')">···</button>
        </div>

        <div class="mgmt-panel" id="mgmt-${c.id}">
          <div class="mgmt-section">
            <div class="t-label">// DETALLE</div>
            <div class="mgmt-detail-grid">
              <div class="mgmt-detail-item">
                <div class="mgmt-detail-val">${regDate}</div>
                <div class="mgmt-detail-lbl">REGISTRO</div>
              </div>
              <div class="mgmt-detail-item">
                <div class="mgmt-detail-val">${c.total_visits}</div>
                <div class="mgmt-detail-lbl">VISITAS TOTALES</div>
              </div>
              <div class="mgmt-detail-item">
                <div class="mgmt-detail-val">${c.rewards_redeemed}</div>
                <div class="mgmt-detail-lbl">CANJES TOTALES</div>
              </div>
              <div class="mgmt-detail-item">
                <div class="mgmt-detail-val">${escapeHTML(c.id.substring(0,8).toUpperCase())}</div>
                <div class="mgmt-detail-lbl">PROTOCOL ID</div>
              </div>
            </div>
          </div>

          <div class="mgmt-section">
            <div class="t-label">// EDITAR DATOS</div>
            <div class="mgmt-field">
              <label class="t-label" for="edit-name-${c.id}">NOMBRE</label>
              <input class="input" id="edit-name-${c.id}" type="text" value="${escapeHTML(c.name)}" maxlength="60">
            </div>
            <div class="mgmt-field">
              <label class="t-label" for="edit-wa-${c.id}">WHATSAPP</label>
              <input class="input" id="edit-wa-${c.id}" type="tel" value="${escapeHTML(c.whatsapp)}" maxlength="20">
            </div>
            <button class="btn btn-secondary" onclick="handleEditCustomer('${c.id}')">GUARDAR CAMBIOS</button>
          </div>

          <div class="mgmt-section">
            <div class="t-label">// AJUSTAR SELLOS</div>
            <div class="stamp-adjuster">
              <button class="adj-btn" onclick="adjStamp('${c.id}', -1)">−</button>
              <div class="adj-count" id="adj-count-${c.id}">${c.stamps}</div>
              <button class="adj-btn" onclick="adjStamp('${c.id}', 1)">+</button>
              <button class="btn btn-secondary" style="width:auto;padding:10px 16px;margin-left:8px" onclick="handleSetStamps('${c.id}')">APLICAR</button>
            </div>
          </div>

          <div class="mgmt-section">
            <button class="btn btn-danger" onclick="handleDeleteCustomer('${c.id}')">ELIMINAR REGISTRO</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function handleGiveStamp(id) {
  const customer = DB.addStamp(id);
  if (customer) {
    const q = document.getElementById('search-input')?.value || '';
    renderCustomerList(q);
    toast(`+1 SELLO → ${customer.name.toUpperCase()} (${customer.stamps}/9)`);
  }
}

function handleRedeemReward(id) {
  const c = DB.getCustomer(id);
  if (!c || c.stamps < 9) return;
  if (!confirm(`¿CANJEAR ROOT MATCHA GRATIS\npara ${c.name}?`)) return;
  const updated = DB.redeemReward(id);
  if (updated) {
    renderCustomerList(document.getElementById('search-input')?.value || '');
    toast(`PROTOCOLO_006 CANJEADO → ${updated.name.toUpperCase()}`);
  }
}

function toggleMgmt(id) {
  const panel = document.getElementById('mgmt-' + id);
  const btn = document.getElementById('mgmt-btn-' + id);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '···' : 'CERRAR';
}

function adjStamp(id, delta) {
  const el = document.getElementById('adj-count-' + id);
  el.textContent = Math.max(0, Math.min(9, parseInt(el.textContent) + delta));
}

function handleSetStamps(id) {
  const count = parseInt(document.getElementById('adj-count-' + id).textContent);
  const customer = DB.setStamps(id, count);
  if (customer) {
    const q = document.getElementById('search-input')?.value || '';
    renderCustomerList(q);
    toast(`SELLOS AJUSTADOS → ${customer.name.toUpperCase()} (${customer.stamps}/9)`);
  }
}

function handleEditCustomer(id) {
  const name = document.getElementById('edit-name-' + id).value.trim();
  const wa = document.getElementById('edit-wa-' + id).value.trim();
  if (!name || !wa) { toast('// ERROR: CAMPOS REQUERIDOS'); return; }
  const customer = DB.updateCustomer(id, { name, whatsapp: wa });
  if (customer) {
    const q = document.getElementById('search-input')?.value || '';
    renderCustomerList(q);
    toast(`CLIENTE ACTUALIZADO → ${customer.name.toUpperCase()}`);
  }
}

function handleDeleteCustomer(id) {
  const c = DB.getCustomer(id);
  if (!c) return;
  if (!confirm(`¿ELIMINAR REGISTRO DE ${c.name}?\nEsta acción no se puede deshacer.`)) return;
  DB.deleteCustomer(id);
  renderCustomerList(document.getElementById('search-input')?.value || '');
  toast('REGISTRO ELIMINADO');
}

          </div>

  document.getElementById('btn-activate-promo').addEventListener('click', () => {
    const msg = document.getElementById('promo-input').value.trim();
    if (!msg) { toast('// ERROR: ESCRIBE UN MENSAJE'); return; }
    DB.setPromotion(msg);
    document.getElementById('promo-preview').classList.add('visible');
    document.getElementById('promo-preview-text').textContent = msg;
    document.getElementById('btn-clear-promo').disabled = false;
    toast('SEÑAL ACTIVADA — VISIBLE EN TODAS LAS TARJETAS');
  });

  document.getElementById('btn-clear-promo').addEventListener('click', () => {
    if (!confirm('¿LIMPIAR SEÑAL ACTIVA?')) return;
    DB.setPromotion(null);
    document.getElementById('promo-preview').classList.remove('visible');
    document.getElementById('promo-input').value = '';
    document.getElementById('btn-clear-promo').disabled = true;
    toast('SEÑAL LIMPIADA');
  });

  document.getElementById('btn-save-pin').addEventListener('click', () => {
    const pin = document.getElementById('new-pin').value;
    const msg = document.getElementById('pin-msg');
    if (!/^\d{4}$/.test(pin)) { msg.textContent = '// ERROR: DEBE SER 4 DÍGITOS'; return; }
    const settings = DB.getSettings();
    settings.pin = pin;
    DB.saveSettings(settings);
    document.getElementById('new-pin').value = '';
    msg.textContent = '// PIN ACTUALIZADO';
    setTimeout(() => { msg.textContent = ''; }, 2000);
  });
}
function renderStatsPanel() {
  const panel = document.getElementById('tab-stats');
  const stats = DB.getStatsToday();
  const customers = DB.getCustomers();
  const totalStamps = customers.reduce((s, c) => s + c.total_visits, 0);

  panel.innerHTML = `
    <div class="t-label" style="margin-bottom:4px">// ESTADÍSTICAS GLOBALES</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value">${stats.totalClients}</div>
        <div class="stat-label">CLIENTES<br>REGISTRADOS</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${stats.stampsToday}</div>
        <div class="stat-label">VISITAS<br>HOY</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${stats.totalRewards}</div>
        <div class="stat-label">RECOMPENSAS<br>CANJEADAS</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${totalStamps}</div>
        <div class="stat-label">SELLOS<br>TOTALES</div>
      </div>
      <div class="stat-box full-width" style="border-color:var(--phosphor)">
        <div class="stat-value" style="font-size:1.4rem">PROTOCOLO_006</div>
        <div class="stat-label" style="margin-top:4px">9 SELLOS = ROOT MATCHA GRATIS ($75)</div>
      </div>
    </div>
  `;
}
